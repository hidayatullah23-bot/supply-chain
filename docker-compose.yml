services:
  app:
    build: .
    ports: ["8000:80"]
    env_file: .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: supply_chain
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on: [db]
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: supply_chain
      MYSQL_ROOT_PASSWORD: root
    volumes: ["mysql_data:/var/lib/mysql"]
volumes:
  mysql_data:
